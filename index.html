<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin Clicker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bricolage+Grotesque:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Menu Screen -->
    <div id="menu-screen" class="screen">
      <h1 class="game-title">Bitcoin Clicker</h1>
      <div class="menu-buttons">
        <button id="start-btn" class="main-btn">Start Game</button>
        <button id="how-to-btn" class="main-btn">How to Play</button>
      </div>
    </div>

    <!-- Instructions Screen -->
    <div id="instructions-screen" class="screen hidden">
      <h2 class="screen-title">How to Play</h2>
      <div class="instructions-content">
        <p>1. Click the Bitcoin to earn Bitcoins.</p>
        <p>2. Use your Bitcoins to buy upgrades in the sidebar.</p>
        <p>3. Upgrades increase your Bitcoins per second (BTC/s).</p>
        <p>4. Become the ultimate Bitcoin billionaire!</p>
      </div>
      <button id="back-to-menu-btn" class="main-btn">Back to Menu</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen hidden">
      <img
        id="shitcoin"
        src="shitcoin.png"
        alt="Shitcoin"
      />
      <div id="clickCounter">Bitcoins: 0</div>
      <div id="cpsCounter">Bitcoins per second: 0</div>
      <div id="comboCounter" class="hidden">Combo: 0</div>
      <div id="comboTimerContainer" class="hidden">
        <div id="comboTimerBar"></div>
      </div>
      <div id="sidebar">
        <button class="upgrade-btn" data-cost="15" data-cps="1">
          CPU Miner (15 BTC)
        </button>
        <button class="upgrade-btn" data-cost="100" data-cps="5">
          GPU Rig (100 BTC)
        </button>
        <button class="upgrade-btn" data-cost="500" data-cps="12">
          ASIC Miner (500 BTC)
        </button>
        <button class="upgrade-btn" data-cost="2000" data-cps="45">
          Mining Farm (2k BTC)
        </button>
        <button class="upgrade-btn" data-cost="10000" data-cps="115">
          Mining Pool (10k BTC)
        </button>
        <button class="upgrade-btn" data-cost="50000" data-cps="400">
          Satellite Node (50k BTC)
        </button>
        <button class="upgrade-btn" data-cost="250000" data-cps="1500">
          Quantum Miner (250k BTC)
        </button>
        <button class="upgrade-btn" data-cost="1000000" data-cps="6500">
          Blockchain Core (1M BTC)
        </button>
        <button class="upgrade-btn" data-cost="5000000" data-cps="25000">
          Satoshi's Legacy (5M BTC)
        </button>
        <button class="upgrade-btn" data-cost="25000000" data-cps="120000">
          Bitcoin Citadel (25M BTC)
        </button>
      </div>
      <button id="pause-btn" class="mini-btn">Menu</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
