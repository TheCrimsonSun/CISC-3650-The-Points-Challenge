<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin Clicker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bricolage+Grotesque:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img id="shitcoin" src="shitcoin.png" alt="Shitcoin" onclick="trackClick()">
    <div id="clickCounter">Clicks: 0</div>
    <div id="cpsCounter">CPS: 0</div>
    <div id="sidebar">
      <button class="upgrade-btn" data-cost="100" data-cps="1">Upgrade 1 (100c, +1 CPS)</button>
      <button class="upgrade-btn" data-cost="200" data-cps="2">Upgrade 2 (200c, +2 CPS)</button>
      <button class="upgrade-btn" data-cost="300" data-cps="3">Upgrade 3 (300c, +3 CPS)</button>
      <button class="upgrade-btn" data-cost="400" data-cps="4">Upgrade 4 (400c, +4 CPS)</button>
      <button class="upgrade-btn" data-cost="500" data-cps="5">Upgrade 5 (500c, +5 CPS)</button>
      <button class="upgrade-btn" data-cost="600" data-cps="6">Upgrade 6 (600c, +6 CPS)</button>
      <button class="upgrade-btn" data-cost="700" data-cps="7">Upgrade 7 (700c, +7 CPS)</button>
      <button class="upgrade-btn" data-cost="800" data-cps="8">Upgrade 8 (800c, +8 CPS)</button>
      <button class="upgrade-btn" data-cost="900" data-cps="9">Upgrade 9 (900c, +9 CPS)</button>
      <button class="upgrade-btn" data-cost="1000" data-cps="10">Upgrade 10 (1000c, +10 CPS)</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
