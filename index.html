<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin Clicker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bricolage+Grotesque:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img id="shitcoin" src="shitcoin.png" alt="Shitcoin" onclick="trackClick(event)">
    <div id="clickCounter">Bitcoins: 0</div>
    <div id="cpsCounter">Bitcoins per second: 0</div>
    <div id="sidebar">
      <button class="sidebar-btn" data-score="15" data-cps="1">CPU Miner (15 BTC)</button>
      <button class="sidebar-btn" data-score="100" data-cps="5">GPU Rig (100 BTC)</button>
      <button class="sidebar-btn" data-score="500" data-cps="12">ASIC Miner (500 BTC)</button>
      <button class="sidebar-btn" data-score="2000" data-cps="45">Mining Farm (2k BTC)</button>
      <button class="sidebar-btn" data-score="10000" data-cps="115">Mining Pool (10k BTC)</button>
      <button class="sidebar-btn" data-score="50000" data-cps="400">Satellite Node (50k BTC)</button>
      <button class="sidebar-btn" data-score="250000" data-cps="1500">Quantum Miner (250k BTC)</button>
      <button class="sidebar-btn" data-score="1000000" data-cps="6500">Blockchain Core (1M BTC)</button>
      <button class="sidebar-btn" data-score="5000000" data-cps="25000">Satoshi's Legacy (5M BTC)</button>
      <button class="sidebar-btn" data-score="25000000" data-cps="120000">Bitcoin Citadel (25M BTC)</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
