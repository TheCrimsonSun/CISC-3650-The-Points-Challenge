<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin Clicker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bricolage+Grotesque:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img id="shitcoin" src="shitcoin.png" alt="Shitcoin" onclick="trackClick(event)">
    <div id="clickCounter">Bitcoins: 0</div>
    <div id="cpsCounter">Bitcoins per second: 0</div>
    <div id="sidebar">
      <button class="sidebar-btn" data-score="100" data-cps="1">CPU Miner (100 BTC)</button>
      <button class="sidebar-btn" data-score="200" data-cps="5">GPU Rig (200 BTC)</button>
      <button class="sidebar-btn" data-score="300" data-cps="10">ASIC Miner (300 BTC)</button>
      <button class="sidebar-btn" data-score="400" data-cps="20">Mining Farm (400 BTC)</button>
      <button class="sidebar-btn" data-score="500" data-cps="50">Mining Pool (500 BTC)</button>
      <button class="sidebar-btn" data-score="600" data-cps="100">Satellite Node (600 BTC)</button>
      <button class="sidebar-btn" data-score="700" data-cps="200">Quantum Miner (700 BTC)</button>
      <button class="sidebar-btn" data-score="800" data-cps="500">Blockchain Core (800 BTC)</button>
      <button class="sidebar-btn" data-score="900" data-cps="1000">Satoshi's Legacy (900 BTC)</button>
      <button class="sidebar-btn" data-score="1000" data-cps="2000">Bitcoin Citadel (1000 BTC)</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
