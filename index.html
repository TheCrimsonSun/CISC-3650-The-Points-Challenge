<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrizePop Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bricolage+Grotesque:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img id="shitcoin" src="shitcoin.png" alt="Shitcoin" onclick="trackClick()">
    <div id="clickCounter">Clicks: 0</div>
    <div id="sidebar">
      <button class="sidebar-btn" data-score="100">Upgrade 1</button>
      <button class="sidebar-btn" data-score="200">Upgrade 2</button>
      <button class="sidebar-btn" data-score="300">Upgrade 3</button>
      <button class="sidebar-btn" data-score="400">Upgrade 4</button>
      <button class="sidebar-btn" data-score="500">Upgrade 5</button>
      <button class="sidebar-btn" data-score="600">Upgrade 6</button>
      <button class="sidebar-btn" data-score="700">Upgrade 7</button>
      <button class="sidebar-btn" data-score="800">Upgrade 8</button>
      <button class="sidebar-btn" data-score="900">Upgrade 9</button>
      <button class="sidebar-btn" data-score="1000">Upgrade 10</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
